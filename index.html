<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ultimate Classroom App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }
    .auth-container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      border: 1px solid #dcdce6;
    }
    h2 {
      margin-bottom: 10px;
      color: #4a4a68;
      text-align: center;
    }
    p {
      text-align: center;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 25px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 0.9rem;
      color: #4a4a68;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #E6E6FA;
    }
    .auth-btn {
      width: 100%;
      padding: 12px;
      background-color: #BFEA7C;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: opacity 0.2s;
    }
    .auth-btn:hover {
      opacity: 0.9;
    }
    .toggle-auth {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
    }
    .toggle-auth a {
      color: #4a4a68;
      font-weight: bold;
      text-decoration: none;
    }
    .toggle-auth a:hover {
      text-decoration: underline;
    }
    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <h2 id="authTitle">Teacher Login</h2>
    <p id="authSubtitle">Access your ultimate classroom workspace</p>
    
    <form id="authForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="teacher@school.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Minimum 6 characters">
      </div>
      <button type="submit" class="auth-btn" id="submitBtn">Sign In</button>
    </form>

    <div class="toggle-auth">
      <span id="toggleText">Don't have an account? </span>
      <a href="#" id="toggleLink">Sign Up Instead</a>
    </div>

    <div class="message" id="messageBox"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Safeguard check to ensure your browser didn't block the CDN library
    if (!window.supabase) {
      document.getElementById('messageBox').style.color = "red";
      document.getElementById('messageBox').textContent = "Security Error: Supabase engine blocked by your browser network protocol.";
    } else {
      const SUPABASE_URL = "https://wfnwjkuojshozhtnlror.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_pQvC4ZJv7e9-AL2lkp6upw_xpYa2twv";
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const authForm = document.getElementById('authForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const authTitle = document.getElementById('authTitle');
      const authSubtitle = document.getElementById('authSubtitle');
      const submitBtn = document.getElementById('submitBtn');
      const toggleLink = document.getElementById('toggleLink');
      const toggleText = document.getElementById('toggleText');
      const messageBox = document.getElementById('messageBox');

      let isSignUpMode = false;

      // Click Event Controller for Interface Toggling
      toggleLink.addEventListener('click', (e) => {
        e.preventDefault();
        isSignUpMode = !isSignUpMode;
        messageBox.textContent = ""; 

        if (isSignUpMode) {
          authTitle.textContent = "Teacher Registration";
          authSubtitle.textContent = "Create an account to host real-time classrooms";
          submitBtn.textContent = "Create Account";
          toggleText.textContent = "Already have an account? ";
          toggleLink.textContent = "Sign In Instead";
        } else {
          authTitle.textContent = "Teacher Login";
          authSubtitle.textContent = "Access your ultimate classroom workspace";
          submitBtn.textContent = "Sign In";
          toggleText.textContent = "Don't have an account? ";
          toggleLink.textContent = "Sign Up Instead";
        }
      });

      // Submit Form Protocol Handler
      authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        
        messageBox.style.color = "#4a4a68";
        messageBox.textContent = "Processing connection request...";

        if (isSignUpMode) {
          const { data, error } = await supabase.auth.signUp({ email, password });
          if (error) {
            messageBox.style.color = "red";
            messageBox.textContent = error.message;
          } else {
            messageBox.style.color = "green";
            messageBox.textContent = "Success! Account created. You can now Sign In.";
          }
        } else {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) {
            messageBox.style.color = "red";
            messageBox.textContent = error.message;
          } else {
            messageBox.style.color = "green";
            messageBox.textContent = "Success! Entering dashboard...";
            setTimeout(() => { window.location.href = "teacher.html"; }, 1000);
          }
        }
      });
    }
  </script>
</body>
</html>
