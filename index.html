<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ultimate Classroom App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }
    .auth-container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      border: 1px solid #dcdce6;
    }
    h2 {
      margin-bottom: 10px;
      color: #4a4a68;
      text-align: center;
    }
    p {
      text-align: center;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 25px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 0.9rem;
      color: #4a4a68;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #E6E6FA;
    }
    .auth-btn {
      width: 100%;
      padding: 12px;
      background-color: #BFEA7C;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: opacity 0.2s;
    }
    .auth-btn:hover {
      opacity: 0.9;
    }
    .toggle-auth {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
    }
    .toggle-auth a {
      color: #4a4a68;
      font-weight: bold;
      text-decoration: none;
    }
    .toggle-auth a:hover {
      text-decoration: underline;
    }
    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <h2 id="authTitle">Teacher Login</h2>
    <p id="authSubtitle">Access your ultimate classroom workspace</p>
    
    <form id="authForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="teacher@school.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Minimum 6 characters">
      </div>
      <button type="submit" class="auth-btn" id="submitBtn">Sign In</button>
    </form>

    <div class="toggle-auth">
      <span id="toggleText">Don't have an account? </span>
      <a href="#" id="toggleLink">Sign Up Instead</a>
    </div>

    <div class="message" id="messageBox"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
</body>
</html>
