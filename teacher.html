<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard - Ultimate Classroom App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard">
    
    <aside class="sidebar">
      <h2>Menu</h2>
      <button>New Session</button>
      <button id="exportBtn">Export Session</button>
      <button>Share Session</button>
      <button class="sign-out">Sign Out</button>
    </aside>

    <main class="main-content">
      
      <header class="top-bar">
        <div class="modes">
  <button class="active">Whiteboard</button>
  <button>Quiz</button>
  <button id="pollModeBtn">Poll</button> 
</div>
        <div class="room-info">
          <span class="join-code">Code: <strong>8492</strong></span>
          <span class="pupil-count">0/30 Joined</span>
        </div>
      </header>

      <section id="pollPanel" style="display: none; background: #f4f4f9; border: 1px solid #ccc; border-radius: 6px; padding: 15px; margin-bottom: 15px; max-width: 1140px;">
  <h3 style="margin-top: 0; color: #4a4a68;">Quick Classroom Poll</h3>
  
  <div id="pollSetup">
    <input type="text" id="pollQuestion" placeholder="Enter poll question here (e.g., Understanding check?)" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
      <input type="text" class="poll-opt" placeholder="Option A" style="flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px;">
      <input type="text" class="poll-opt" placeholder="Option B" style="flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px;">
      <input type="text" class="poll-opt" placeholder="Option C" style="flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px;">
      <input type="text" class="poll-opt" placeholder="Option D" style="flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px;">
    </div>
    <button id="startPollBtn" style="background: #2ecc71; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">Launch Poll</button>
  </div>

  <div id="pollLiveResults" style="display: none;">
    <h4 id="livePollQuestion" style="margin: 5px 0 10px 0; color: #333;"></h4>
    <div id="resultsBars" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;">
      </div>
    <button id="endPollBtn" style="background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">Close Poll & Save Results</button>
  </div>
</section>

      <section class="teacher-stage">
        
        <div style="display: flex; gap: 15px; background: #e1e1eb; padding: 8px 15px; border-radius: 6px 6px 0 0; border: 1px solid #ccc; border-bottom: none; align-items: center; max-width: 1140px;">
          <label style="color: #4a4a68; font-size: 13px; font-weight: bold;">Pen Thickness:</label>
          <input type="range" id="penThickness" min="2" max="30" value="4" style="width: 80px; cursor: pointer; vertical-align: middle;">

          <label style="color: #4a4a68; font-size: 13px; font-weight: bold; margin-left: 10px;">Text Size:</label>
          <input type="range" id="textSizeSelector" min="14" max="72" value="24" style="width: 80px; cursor: pointer; vertical-align: middle;">
        </div>

        <div class="canvas-wrapper" style="border-top-left-radius: 0; border-top-right-radius: 0;">
          
          <div class="tool-bar-vertical">
  <button class="tool-btn active" id="penToolBtn">Pen</button>
  <button class="tool-btn" id="rubberToolBtn">Rubber</button>
  <button class="tool-btn" id="textToolBtn">Text</button>
  <button class="tool-btn" id="imgToolBtn">Img</button>
  
  <button class="tool-btn" id="undoBtn">Undo</button>
  
  <hr class="tool-divider">
  <input type="color" id="penColor" value="#333333">
</div>
          
          <div class="canvas-position-wrapper" style="position: relative; display: inline-block; max-width: 100%; flex-grow: 1;">
            <canvas id="teacherCanvas" width="1100" height="520" style="touch-action: none; background: #ffffff; border: 1px solid #ccc; max-width: 100%; height: auto; display: block;"></canvas>
          </div>

        </div>
        
        <div class="tools-row">
          <button id="clearBtn">Clear Board</button>
          
          <div class="pagination">
            <button class="page-btn">&lt;</button>
            <span class="page-text">Board 1 of 1</span>
            <button class="page-btn">&gt;</button>
          </div>

          <div class="timer">Timer: 05:00</div>
          <button id="freezeBtn">Freeze Class</button>
        </div>

      </section>

      <section class="pupil-boards">
        <button class="see-all">See All</button>
        <div class="mini-board"></div>
        <div class="mini-board"></div>
        <div class="mini-board"></div>
        <div class="mini-board"></div>
      </section>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
