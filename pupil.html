<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pupil View - Ultimate Classroom App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }
    .classroom-container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid #dcdce6;
      width: 100%;
      max-width: 1140px;
    }
    
    /* STYLE FOR THE GATEKEEPER JOIN CARD */
    .join-card {
      max-width: 400px;
      margin: 40px auto;
      text-align: center;
      padding: 20px;
    }
    .join-card h2 {
      margin-bottom: 20px;
      color: #4a4a68;
    }
    .join-card input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 2px solid #e1e1eb;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .join-card input:focus {
      border-color: #4a4a68;
    }
    .join-card button {
      width: 100%;
      padding: 12px;
      background-color: #4a4a68;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .join-card button:hover {
      background-color: #373751;
    }

    /* WHITEBOARD INTERFACE STYLE */
    .status-bar {
      padding: 12px;
      background-color: #4a4a68;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      margin-bottom: 15px;
      text-align: center;
      transition: background-color 0.3s;
    }
    canvas {
      display: block;
      background-color: #fff;
      border: 1px solid #e1e1eb;
      border-radius: 6px;
      background-image: radial-gradient(#e1e1eb 1px, transparent 1px);
      background-size: 20px 20px;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

  <div class="classroom-container">
    
    <div id="joinScreen" class="join-card">
      <h2>Join Your Lesson</h2>
      <input type="text" id="pupilNameInput" placeholder="Enter your name..." required>
      <input type="text" id="roomCodeInput" placeholder="Enter 4-digit room code..." required>
      <button id="joinClassBtn">Join Class</button>
    </div>

<div id="boardWorkspace" style="display: none;">
      <div class="status-bar" id="statusBar">Connecting to Teacher's Board...</div>
      
      <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center;">
        <span style="font-weight: bold; color: #4a4a68;">Your Tools:</span>
        <input type="color" id="pupilPenColor" value="#333333" style="border: none; cursor: pointer; width: 40px; height: 30px; border-radius: 4px;">
        <button id="pupilClearBtn" style="padding: 6px 12px; background: #ffcccc; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: #cc0000;">Clear My Board</button>
      </div>

      <canvas id="pupilCanvas" width="1100" height="520" style="touch-action: none; background: #ffffff; border: 1px solid #ccc; max-width: 100%; height: auto; display: block;"></canvas>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pupil.js"></script>
</body>
</html>
